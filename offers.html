<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="offers-top-nav">
    <div class="offers-top-inner">
      <a href="index.html" class="full-logo">
        <img src="swiggy-logo.png" alt="">
        <span>Swiggy</span>
      </a>

      <div class="location-setup">📍 Setup your precise location⌄</div>

      <div class="top-search">
        <input type="text" placeholder="Search for restaurant and food">
        <span>⌕</span>
      </div>

      <div class="profile-circle">●</div>
    </div>
  </nav>

  <main class="offers-wrapper">
    <section class="dineout-banner">
      <div class="dineout-label">▣ Dineout</div>
      <h1>Restaurants With Great Offers Near Me</h1>
    </section>

    <div class="offer-tabs">
      <span>Order Online</span>
      <span class="active">Dineout</span>
    </div>

    <div class="filter-row">
      <button class="filter-pill">1 Filter ☰</button>
      <button class="filter-pill">Sort By⌄</button>
      <button class="filter-pill">Book a table</button>
      <button class="filter-pill">Within 5km</button>
      <button class="filter-pill">Rating 4+</button>
      <button class="filter-pill">Pure Veg</button>
    </div>

    <div class="dineout-grid">
      <div class="dineout-card">
        <div class="dineout-img">
          <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=700&auto=format&fit=crop" alt="">
          <div class="dineout-name">Openhouse Cafe</div>
        </div>
        <div class="dineout-content">Continental • North Indian <span>₹2000 for two</span></div>
      </div>

      <div class="dineout-card">
        <div class="dineout-img">
          <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=700&auto=format&fit=crop" alt="">
          <div class="dineout-name">Warehouse Cafe</div>
        </div>
        <div class="dineout-content">Asian • North Indian <span>₹2000 for two</span></div>
      </div>

      <div class="dineout-card">
        <div class="dineout-img">
          <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=700&auto=format&fit=crop" alt="">
          <div class="dineout-name">My Bar Square</div>
        </div>
        <div class="dineout-content">Chinese • North Indian <span>₹1400 for two</span></div>
      </div>
    </div>
  </main>

</body>
</html>
